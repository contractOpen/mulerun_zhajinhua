services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      APP_MODE: ${APP_MODE:-pe}
      PORT: 8080
      DB_PATH: /app/data/zhajinhua.db
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - zhajinhua-backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  zhajinhua-backend-data:
